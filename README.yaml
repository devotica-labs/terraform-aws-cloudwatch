    url: https://github.com/devotica-labs/terraform-aws-lambda

description: |-
  Terraform module for the AWS **CloudWatch** monitoring baseline — encrypted,
  retained log groups, metric alarms wired to alarm actions (e.g. an SNS topic),
  and an optional dashboard. Fintech defaults: KMS encryption when a key ARN is
  supplied and a 90-day retention floor.

introduction: |-
  This module creates the [Amazon CloudWatch](https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/WhatIsCloudWatch.html)
  observability baseline for a workload: one or more log groups (KMS-encrypted
  when kms_key_arn is set, retained for default_retention_days unless a group
  overrides it), a set of metric alarms notifying their alarm_actions on breach
  and recovery, and an optional dashboard rendered from a JSON body. Resource
  names compose the native label id with each map key.

usage: |-
  See [`examples/complete`](examples/complete) for the full surface (multiple log
  groups, several alarms, a dashboard) and [`examples/basic`](examples/basic) for
  a single log group plus a CPU alarm notifying an SNS topic.

